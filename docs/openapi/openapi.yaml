    Client:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        name:
          type: string
        contact_name:
          type: [string, 'null']
        email:
          type: [string, 'null']
        billing_address:
          type: [string, 'null']
        registration_number:
          type: [string, 'null']
        created_at:
          type: [string, 'null']
        updated_at:
          type: [string, 'null']
      required: [id, organization_id, name]
    ClientList:
      $ref: '#/components/schemas/PageEnvelope'
    CreateClientRequest:
      type: object
      properties:
        name:
          type: string
        contact_name:
          type: [string, 'null']
        email:
          type: [string, 'null']
        billing_address:
          type: [string, 'null']
        registration_number:
          type: [string, 'null']
      required: [name]
    UpdateClientRequest:
      type: object
      properties:
        name:
          type: string
        contact_name:
          type: [string, 'null']
        email:
          type: [string, 'null']
        billing_address:
          type: [string, 'null']
        registration_number:
          type: [string, 'null']
    LineItem:
      type: object
      description: A line on a quote or invoice. Money is integer cents.
      properties:
        id:
          type: integer
        description:
          type: string
        quantity:
          type: integer
        unit_price_cents:
          type: integer
          description: Unit price in integer cents (smallest currency unit).
        tax_rate_bps:
          type: integer
          description: Tax rate in basis points (1000 = 10%, 800 = 8%).
        sort_order:
          type: integer
        line_subtotal_cents:
          type: integer
          description: quantity × unit_price_cents (pre-tax, not rounded).
      required: [description, quantity, unit_price_cents, tax_rate_bps]
    LineItemInput:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_price_cents:
          type: integer
          minimum: 0
        tax_rate_bps:
          type: integer
          enum: [800, 1000]
      required: [description, quantity, unit_price_cents, tax_rate_bps]
    Quote:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        client_id:
          type: integer
        quote_number:
          type: string
          description: Format EST-YYYY-NNN.
        status:
          type: string
          enum: [draft, sent, accepted, rejected, expired]
        issued_at:
          type: [string, 'null']
        valid_until:
          type: [string, 'null']
        subtotal_cents:
          type: integer
        tax_cents:
          type: integer
        total_cents:
          type: integer
        notes:
          type: [string, 'null']
        created_at:
          type: [string, 'null']
        updated_at:
          type: [string, 'null']
      required: [id, organization_id, client_id, quote_number, status, subtotal_cents, tax_cents, total_cents]
    QuoteWithLines:
      allOf:
        - $ref: '#/components/schemas/Quote'
        - type: object
          properties:
            line_items:
              type: array
              items:
                $ref: '#/components/schemas/LineItem'
    QuoteList:
      $ref: '#/components/schemas/PageEnvelope'
    CreateQuoteRequest:
      type: object
      properties:
        client_id:
          type: integer
        line_items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LineItemInput'
        valid_until:
          type: [string, 'null']
        notes:
          type: [string, 'null']
      required: [client_id, line_items]
    ChangeQuoteStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [draft, sent, accepted, rejected, expired]
      required: [status]
    Invoice:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        client_id:
          type: integer
        quote_id:
          type: [integer, 'null']
        invoice_number:
          type: [string, 'null']
          description: Null until issued; format INV-YYYY-NNN.
        status:
          type: string
          enum: [draft, issued, partially_paid, paid]
        is_qualified_invoice:
          type: boolean
        issued_at:
          type: [string, 'null']
        due_at:
          type: [string, 'null']
        subtotal_cents:
          type: integer
        tax_cents:
          type: integer
        total_cents:
          type: integer
        outstanding_cents:
          type: integer
          description: >
            total_cents − Σ valid payments. Present on read endpoints (list / get);
            authoritative balance owned by Invoice. Integer cents.
        notes:
          type: [string, 'null']
        created_at:
          type: [string, 'null']
        updated_at:
          type: [string, 'null']
      required: [id, organization_id, client_id, status, is_qualified_invoice, subtotal_cents, tax_cents, total_cents]
    InvoiceWithLines:
      allOf:
        - $ref: '#/components/schemas/Invoice'
        - type: object
          properties:
            line_items:
              type: array
              items:
                $ref: '#/components/schemas/LineItem'
    InvoiceList:
      $ref: '#/components/schemas/PageEnvelope'
    CreateInvoiceRequest:
      type: object
      properties:
        client_id:
          type: integer
        line_items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LineItemInput'
        notes:
          type: [string, 'null']
      required: [client_id, line_items]
    IssueInvoiceRequest:
      type: object
      properties:
        qualified:
          type: boolean
          default: true
          description: Whether to issue as a qualified invoice (適格請求書).
        due_at:
          type: [string, 'null']
    Payment:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        invoice_id:
          type: integer
        amount_cents:
          type: integer
          description: Payment amount in integer cents.
        paid_at:
          type: string
        method:
          type: [string, 'null']
          enum: [bank_transfer, cash, other, null]
        note:
          type: [string, 'null']
        created_at:
          type: [string, 'null']
        updated_at:
          type: [string, 'null']
      required: [id, organization_id, invoice_id, amount_cents, paid_at]
    PaymentList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        total_paid_cents:
          type: integer
      required: [items, total_paid_cents]
    RecordPaymentRequest:
      type: object
      properties:
        amount_cents:
          type: integer
          minimum: 1
          description: Payment amount in integer cents (positive).
        paid_at:
          type: [string, 'null']
        method:
          type: [string, 'null']
          enum: [bank_transfer, cash, other, null]
        note:
          type: [string, 'null']
      required: [amount_cents]
    RecordPaymentResponse:
      type: object
      properties:
        payment:
          $ref: '#/components/schemas/Payment'
        invoice:
          $ref: '#/components/schemas/Invoice'
        total_paid_cents:
          type: integer
      required: [payment, invoice, total_paid_cents]
    AuditLog:
      type: object
      properties:
        id:
          type: integer
        actor_user_id:
          type: [integer, 'null']
        organization_id:
          type: [integer, 'null']
        action:
          type: string
          description: e.g. invoice.created, invoice.issued, payment.recorded.
        entity_type:
          type: string
        entity_id:
          type: [integer, 'null']
        before:
          type: [object, 'null']
          additionalProperties: true
        after:
          type: [object, 'null']
          additionalProperties: true
        created_at:
          type: [string, 'null']
      required: [id, action, entity_type]
    AuditLogList:
      $ref: '#/components/schemas/PageEnvelope'
    PageEnvelope:
      type: object
      description: Standard list envelope (items vary by endpoint).
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [items, total, limit, offset]
security:
  - bearerAuth: []
