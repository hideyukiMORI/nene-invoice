    ClientList:
      $ref: '#/components/schemas/PageEnvelope'
    CsvImportReport:
      type: object
      description: Result of a clients import (ADR 0011). `accepted` drives the status.
      properties:
        accepted:
          type: boolean
        dry_run:
          type: boolean
        format_error:
          type: [string, 'null']
          description: File-level rejection reason (header / encoding / size); null if none.
        summary:
