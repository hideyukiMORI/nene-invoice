      description: >
        Downloads all valid (non-voided) payments for the organization as a
        UTF-8 BOM CSV file compatible with Excel and accounting software.
        Includes invoice number and client name for reference.
        Requires ViewBilling capability.
      operationId: exportPaymentsCsv
      security:
        - bearerAuth: []
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      operationId: listInvoices
      description: >
        Lists invoices with optional search / filters / sort (admin). `q` matches
        invoice number or client name; `status` is a comma-separated subset;
        `sort` ∈ number|client|status|issued_at|due_at|total with `order` asc|desc.
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - { name: q, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: string } }
        - { name: overdue, in: query, required: false, schema: { type: string, enum: ['1'] } }
        - { name: due_from, in: query, required: false, schema: { type: string } }
        - { name: due_to, in: query, required: false, schema: { type: string } }
        - { name: total_min, in: query, required: false, schema: { type: integer } }
        - { name: total_max, in: query, required: false, schema: { type: integer } }
        - { name: sort, in: query, required: false, schema: { type: string, enum: [number, client, status, issued_at, due_at, total] } }
        - { name: order, in: query, required: false, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: Invoice page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    post:
      tags: [Invoices]
      summary: Create invoice
      description: Creates a draft invoice directly (no originating quote).
      operationId: createInvoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
            example:
              client_id: 1
              line_items:
                - description: License
                  quantity: 2
                  unit_price_cents: 50000
                  tax_rate_bps: 1000
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/invoices/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Invoices]
      summary: Get invoice by id
      operationId: getInvoiceById
      responses:
        '200':
          description: Invoice with line items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/invoices/{id}/pdf:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Invoices]
      summary: Download invoice PDF
      description: >
        Generates and streams the invoice as a PDF (適格請求書 layout when
        is_qualified_invoice is true). Requires ViewBilling capability.
        Returns application/pdf with Content-Disposition: attachment.
      operationId: getInvoicePdf
      security:
        - bearerAuth: []
      responses:
        '200':
          description: PDF binary
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/invoices/{id}/download-token:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [Invoices]
      summary: Generate public download token
      description: >
        Generates a time-limited (7 days) public URL for the invoice PDF.
        The URL requires no authentication — share it with the client.
        Requires ManageBilling capability.
      operationId: generateDownloadToken
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Token generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /invoices/download/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Invoices]
      summary: Public PDF download
      description: >
        Downloads the invoice PDF using a previously generated token. No
        authentication required. Returns 404 for missing or expired tokens.
      operationId: downloadInvoicePdf
      responses:
        '200':
          description: PDF binary
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/invoices/{id}/payment-links:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [Payments]
      summary: Generate a card payment link
      description: >
        Issues a time-limited (7 days), revocable payment link that lets the
        payer settle the invoice on the hosted gateway (PAY.JP — ADR 0012/0013).
        Re-issuing auto-revokes any prior active link for the invoice. Card data
        never touches this API (SAQ-A). Requires ManageBilling capability.
      operationId: generatePaymentLink
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Payment link generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentLinkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/payment-links/{id}/revoke:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [Payments]
      summary: Revoke a payment link
      description: >
        Revokes an active payment link so it can no longer be paid. Idempotent:
        revoking an already-terminal link returns 200. Requires ManageBilling
        capability.
      operationId: revokePaymentLink
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payment link revoked (or already inactive)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentLinkRevokeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /pay/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Payments]
      summary: Public card payment page
      description: >
        Public, no authentication. Renders a minimal HTML page that loads PAY.JP
        Checkout (hosted card iframe — SAQ-A; no operator scripts). Returns a 404
        HTML page for unknown/expired/revoked/paid links.
      operationId: getPaymentPage
      responses:
        '200':
          description: Payment page (HTML)
          content:
            text/html:
              schema: { type: string }
        '404':
          description: Link not payable (HTML)
          content:
            text/html:
              schema: { type: string }
  /pay/{token}/charge:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Payments]
      summary: Charge a payment link
      description: >
        Public, no authentication. Receives the single-use card token posted by
        PAY.JP Checkout (`payjp-token`) and charges the invoice's outstanding
        balance. Renders an HTML result page. No card data is read or stored.
      operationId: chargePaymentLink
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                payjp-token:
                  type: string
                  description: Single-use card token from PAY.JP Checkout.
              required: [payjp-token]
      responses:
        '200':
          description: Payment accepted (HTML)
          content:
            text/html:
              schema: { type: string }
        '402':
          description: Charge declined or failed (HTML)
          content:
            text/html:
              schema: { type: string }
        '404':
          description: Link not payable (HTML)
          content:
            text/html:
              schema: { type: string }
  /webhooks/payjp:
    post:
      tags: [Payments]
      summary: PAY.JP settlement webhook
      description: >
        Public ingress for PAY.JP webhook events, authenticated by the
        `X-Payjp-Webhook-Token` header (PAY.JP does not HMAC-sign webhooks).
        Records a confirmed `charge.succeeded` settlement against its payment link
        (idempotent on the charge id). Returns 200 for handled, ignored, and
        unresolvable events so PAY.JP stops retrying; 401 for a bad token.
      operationId: payjpWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: PAY.JP event object (id, type, data charge, …).
      responses:
        '200':
          description: Event acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        '400':
          description: Malformed body
        '401':
          description: Missing or incorrect webhook token
  /admin/invoices/{id}/issue:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [Invoices]
      summary: Issue invoice
      description: >
        Issues a draft invoice: allocates an INV number and locks it. A qualified
        invoice requires the issuer registration number in company settings.
      operationId: issueInvoice
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueInvoiceRequest'
            example:
              qualified: true
      responses:
        '200':
          description: Invoice issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/QualifiedInvoiceIncomplete'
  /admin/invoices/{id}/send-email:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [Invoices]
      summary: Send invoice by email
      description: >
        Generates the invoice PDF and sends it to the client's email address.
        Requires the invoice to be in issued, partially_paid, or paid status
        and the client to have an email address. Requires ManageBilling capability.
      operationId: sendInvoiceEmail
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Email sent
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '502':
          $ref: '#/components/responses/EmailDeliveryFailed'
  /admin/invoices/{id}/payments:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Payments]
      summary: List payments
      description: Lists the payments recorded against an invoice.
      operationId: listPayments
      responses:
        '200':
          description: Payments for the invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Payments]
      summary: Record payment
      description: >
        Records a payment against an issued invoice and advances its status to
        partially_paid or paid. Amounts are integer cents; over-payment is rejected.
      operationId: recordPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaymentRequest'
            example:
              amount_cents: 110000
              method: bank_transfer
      responses:
        '201':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordPaymentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/bank-transactions:
    get:
      tags: [BankTransactions]
      summary: List staged bank transactions
      operationId: listBankTransactions
      description: >
        Lists staged bank lines for the reconciliation workbench (自動消込),
        newest first, optionally filtered by status. Read-only (ViewBilling).
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by reconciliation status.
          schema:
            type: string
            enum: [unmatched, matched, posted, ignored]
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Bank transaction page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankTransactionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/bank-transactions/import:
    post:
      tags: [BankTransactions]
      summary: Import a bank statement CSV
      description: >
        Imports a bank statement CSV uploaded as the raw text/csv body (raw bytes
        preserve Shift_JIS for the encoding auto-detector). `?preset=` selects the
        column mapping. Staging only — records no payment; idempotent on
        bank_reference. A whole-file format error returns 422; otherwise 200 with
        per-row counts. Requires ManageBilling.
      operationId: importBankTransactions
      parameters:
        - name: preset
          in: query
          required: false
          description: Column-mapping preset.
          schema:
            type: string
            enum: [net_bank_credit_debit, signed_amount]
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
      responses:
        '200':
          description: Import accepted; staged rows counted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankImportResult'
        '422':
          description: Rejected — whole-file format error; nothing staged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankImportResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/bank-transactions/{id}/suggestions:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [BankTransactions]
      summary: Suggest invoice matches for a bank line
      operationId: getBankTransactionSuggestions
      description: >
        Ranked invoice candidates a staged deposit might settle (score + reasons +
        display fields). Read-only; only credit lines yield suggestions.
      responses:
        '200':
          description: Ranked match suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankMatchSuggestionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/bank-transactions/{id}/confirm:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [BankTransactions]
      summary: Confirm a bank match and record payment
      operationId: confirmBankTransactionMatch
      description: >
        Confirms an operator's match to an invoice and records the payment,
        reusing the tax-signed-off RecordPayment path (idempotent on the bank line;
        external_reference = bank_reference). The exact deposit amount is recorded —
        a short deposit leaves the remainder outstanding (no write-off). Over-payment
        is rejected (payment-exceeds-outstanding). Requires ManageBilling.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmBankMatchRequest'
            example:
              invoice_id: 1
      responses:
        '200':
          description: Match confirmed; payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankConfirmResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/bank-transactions/{id}/ignore:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [BankTransactions]
      summary: Ignore a staged bank line
      operationId: ignoreBankTransaction
      description: >
        Dismisses a staged line the operator will not reconcile (fees, non-AR
        transfers, duplicates). A posted line cannot be ignored. Requires ManageBilling.
      responses:
        '200':
          description: Line moved to ignored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankTransaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: ni_refresh
      description: >
        httpOnly refresh-token cookie issued at login (ADR 0014). Sent
        automatically by the browser to the /auth path; never readable by JS.
  parameters:
    LimitParam:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return (1–100, default 20).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      required: false
      description: Number of items to skip (default 0).
      schema:
        type: integer
        minimum: 0
        default: 0
    IdPathParam:
      name: id
      in: path
      required: true
      description: Resource identifier.
      schema:
        type: integer
        minimum: 1
    CsrfTokenHeader:
      name: X-CSRF-Token
      in: header
      required: true
      description: >
        Double-submit CSRF token — must echo the readable `ni_csrf` cookie
        (ADR 0014). Required on cookie-authenticated, state-changing endpoints.
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid bearer token, or bad credentials.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InsufficientCapability:
      description: Authenticated but lacking the required capability.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    CsrfForbidden:
      description: Double-submit CSRF token missing or invalid (ADR 0014).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Resource not found (or not in the caller's organization).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      description: Conflicting request (e.g. cannot delete self).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    SlugConflict:
      description: Organization slug already in use.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    EmailConflict:
      description: User email already in use.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    TooManyRequests:
      description: Too many failed login attempts from the source IP.
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ValidationFailed:
      description: Request body or field validation error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    EmailDeliveryFailed:
      description: The mail transport (SMTP) failed; the email was not delivered.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InvalidRegistrationNumber:
      description: Registration number is not `T` followed by 13 digits.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InvalidStateTransition:
      description: Disallowed status change.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    QualifiedInvoiceIncomplete:
      description: A required qualified-invoice field is missing.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    ProblemDetails:
      type: object
      description: RFC 9457 problem details.
      properties:
        type:
          type: string
          description: Problem type URI (base https://nene-invoice.dev/problems/).
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
      required: [type, title, status]
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: nene-invoice
        checks:
          type: object
          properties:
            database:
              type: string
              example: ok
      required: [status, service]
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: HMAC bearer token (HS256).
      required: [token]
    CurrentUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        organization_id:
          type: [integer, 'null']
      required: [id, email, role]
    Role:
      type: string
      enum: [superadmin, admin, member, viewer]
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        organization_id:
          type: [integer, 'null']
        status:
          type: string
          enum: [active, invited]
        created_at:
          type: [string, 'null']
        updated_at:
          type: [string, 'null']
      required: [id, email, role]
    UserList:
      $ref: '#/components/schemas/PageEnvelope'
    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          $ref: '#/components/schemas/Role'
      required: [email, password, role]
    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          $ref: '#/components/schemas/Role'
    Organization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        plan:
          type: [string, 'null']
        is_active:
          type: boolean
        external_id:
          type: [string, 'null']
        custom_domain:
          type: [string, 'null']
        created_at:
          type: [string, 'null']
        updated_at:
          type: [string, 'null']
      required: [id, name, slug, is_active]
    OrganizationList:
      $ref: '#/components/schemas/PageEnvelope'
    CreateOrganizationRequest:
      type: object
      description: >-
        Creates a tenant (superadmin only). The optional admin_email /
        admin_password fields provision the tenant's first admin atomically with
        the organization; they are both-or-neither — supplying only one is a 422.
      properties:
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
          description: Billing plan slug. Defaults to "free" when omitted.
        admin_email:
          type: string
          format: email
          description: >-
            Email of the tenant's initial admin. Requires admin_password.
        admin_password:
          type: string
          format: password
          description: >-
            Plaintext password for the tenant's initial admin (hashed
            server-side). Requires admin_email.
      required: [name, slug]
    UpdateOrganizationRequest:
      type: object
      description: >-
        Partial update of a tenant (superadmin only). Every field is optional;
        at least one must be present (else 422). is_active suspends (false) or
        reactivates (true) the tenant. slug and external_id are immutable here.
      properties:
        name:
          type: string
        plan:
          type: string
          description: Billing plan slug.
        is_active:
          type: boolean
          description: false suspends the tenant (its users are locked out); true reactivates it.
