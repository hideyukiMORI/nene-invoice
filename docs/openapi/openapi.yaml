  /admin/quotes:
    get:
      tags: [Quotes]
      summary: List quotes
      operationId: listQuotes
      description: >
        Lists quotes with optional search / filters / sort (admin). `q` matches
        quote number or client name; `status` is a comma-separated subset;
        `sort` ∈ number|client|status|issued_at|valid_until|total with `order`.
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - { name: q, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: string } }
        - { name: valid_from, in: query, required: false, schema: { type: string } }
        - { name: valid_to, in: query, required: false, schema: { type: string } }
        - { name: total_min, in: query, required: false, schema: { type: integer } }
        - { name: total_max, in: query, required: false, schema: { type: integer } }
        - { name: sort, in: query, required: false, schema: { type: string, enum: [number, client, status, issued_at, valid_until, total] } }
        - { name: order, in: query, required: false, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: Quote page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    post:
      tags: [Quotes]
      summary: Create quote
      description: Creates a draft quote; computes totals (round once per tax rate).
      operationId: createQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuoteRequest'
            example:
              client_id: 1
              line_items:
                - description: Consulting
                  quantity: 1
                  unit_price_cents: 100000
                  tax_rate_bps: 1000
      responses:
        '201':
          description: Quote created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/quotes/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Quotes]
      summary: Get quote by id
      operationId: getQuoteById
      responses:
        '200':
          description: Quote with line items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
