          type: string
          nullable: true
          description: Masked public key for display, or null when unset.
        secret_set: { type: boolean }
        webhook_token_set: { type: boolean }
        configured:
          type: boolean
          description: True when both secret and public key are present.
      required: [gateway, public_key_masked, secret_set, webhook_token_set, configured]
    GatewayConnectivityResponse:
      type: object
      properties:
        ok: { type: boolean }
        detail:
          type: string
          enum: [connected, not_configured, invalid_credentials, unreachable]
      required: [ok, detail]
    LineItemSuggestion:
      type: object
      properties:
        description:
          type: string
          description: A distinct line-item description the organization has used before.
        unit_price_cents:
          type: integer
          description: Default unit price in cents (from the most recent use; editable per line).
        tax_rate_bps:
          type: integer
          description: Default tax rate in basis points (from the most recent use; editable per line).
        usage_count:
          type: integer
          description: How many times this description appears in recent history.
        source:
          type: string
          enum: [master, history]
          description: >
            Where the suggestion came from — `master` (item master, authoritative)
            or `history` (derived from past documents).
      required: [description, unit_price_cents, tax_rate_bps, usage_count, source]
    LineItemSuggestionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LineItemSuggestion'
      required: [items]
    DashboardSummary:
      type: object
      properties:
        unpaid_count:
          type: integer
          description: Number of issued + partially_paid invoices.
        overdue_count:
          type: integer
          description: Number of invoices where is_overdue is true.
        outstanding_total_cents:
          type: integer
          description: Sum of outstanding balance across all unpaid invoices, in cents.
        recent_unpaid:
          type: array
          description: Up to 5 most recent unpaid invoices, newest first.
          items:
            $ref: '#/components/schemas/Invoice'
        received_this_month_cents:
          type: integer
          description: Sum of non-void payments received in the current month (paid_at based), in cents.
        received_last_month_cents:
          type: integer
          description: Sum of non-void payments received in the previous month, in cents (for month-over-month comparison).
        aging:
          $ref: '#/components/schemas/ReceivableAging'
        billed_this_month_cents:
          type: integer
          description: Total of invoices issued in the current month (issued_at based), in cents.
        billed_last_month_cents:
          type: integer
          description: Total of invoices issued in the previous month, in cents (for month-over-month comparison).
        monthly_billed:
          type: array
          description: Issued-invoice totals for the last 6 calendar months, oldest first.
          items:
            $ref: '#/components/schemas/MonthlyBilled'
        billed_prev_year_month_cents:
          type: integer
          description: Total of invoices issued in the same month one year ago, in cents (year-over-year).
        billed_daily_current:
          type: array
          description: Cumulative issued total per day for the current month, day 1 to today.
          items:
            $ref: '#/components/schemas/DailyBilled'
        billed_daily_prev_month:
          type: array
          description: Cumulative issued total per day for the full previous month (pace comparison).
          items:
            $ref: '#/components/schemas/DailyBilled'
