        expires_at:
          type: string
          description: Token expiry timestamp (Y-m-d H:i:s).
      required: [url, expires_at]
    LineItemSuggestion:
      type: object
      properties:
        description:
          type: string
          description: A distinct line-item description the organization has used before.
        unit_price_cents:
          type: integer
          description: Default unit price in cents (from the most recent use; editable per line).
        tax_rate_bps:
          type: integer
          description: Default tax rate in basis points (from the most recent use; editable per line).
        usage_count:
          type: integer
          description: How many times this description appears in recent history.
        source:
          type: string
          enum: [master, history]
          description: >
            Where the suggestion came from — `master` (item master, authoritative)
            or `history` (derived from past documents).
      required: [description, unit_price_cents, tax_rate_bps, usage_count, source]
    LineItemSuggestionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LineItemSuggestion'
      required: [items]
    DashboardSummary:
      type: object
      properties:
        unpaid_count:
          type: integer
          description: Number of issued + partially_paid invoices.
        overdue_count:
          type: integer
          description: Number of invoices where is_overdue is true.
        outstanding_total_cents:
          type: integer
          description: Sum of outstanding balance across all unpaid invoices, in cents.
        recent_unpaid:
          type: array
          description: Up to 5 most recent unpaid invoices, newest first.
          items:
            $ref: '#/components/schemas/Invoice'
        received_this_month_cents:
          type: integer
          description: Sum of non-void payments received in the current month (paid_at based), in cents.
        received_last_month_cents:
          type: integer
          description: Sum of non-void payments received in the previous month, in cents (for month-over-month comparison).
        aging:
          $ref: '#/components/schemas/ReceivableAging'
        billed_this_month_cents:
          type: integer
          description: Total of invoices issued in the current month (issued_at based), in cents.
        billed_last_month_cents:
          type: integer
          description: Total of invoices issued in the previous month, in cents (for month-over-month comparison).
        monthly_billed:
          type: array
          description: Issued-invoice totals for the last 6 calendar months, oldest first.
          items:
            $ref: '#/components/schemas/MonthlyBilled'
        billed_prev_year_month_cents:
          type: integer
          description: Total of invoices issued in the same month one year ago, in cents (year-over-year).
        billed_daily_current:
          type: array
          description: Cumulative issued total per day for the current month, day 1 to today.
          items:
            $ref: '#/components/schemas/DailyBilled'
        billed_daily_prev_month:
          type: array
          description: Cumulative issued total per day for the full previous month (pace comparison).
          items:
            $ref: '#/components/schemas/DailyBilled'
      required: [unpaid_count, overdue_count, outstanding_total_cents, recent_unpaid, received_this_month_cents, received_last_month_cents, aging, billed_this_month_cents, billed_last_month_cents, monthly_billed, billed_prev_year_month_cents, billed_daily_current, billed_daily_prev_month]
    DailyBilled:
      type: object
      description: Cumulative issued-invoice total at a given day of the month.
      properties:
        day:
          type: integer
          description: Day of month (1–31).
        cumulative_cents:
          type: integer
          description: Cumulative issued total from day 1 through this day, in cents.
      required: [day, cumulative_cents]
    MonthlyBilled:
      type: object
      description: Issued-invoice total for one calendar month.
      properties:
        month:
          type: string
          description: Calendar month, `YYYY-MM`.
        billed_cents:
          type: integer
          description: Total of invoices issued in this month, in cents.
        count:
          type: integer
          description: Number of invoices issued in this month.
      required: [month, billed_cents, count]
    ReceivableAging:
      type: object
      description: Outstanding receivable balance bucketed by overdue age, in cents.
      properties:
        current:
          type: integer
          description: Not yet due (due_at null or in the future), in cents.
        overdue_1_30:
          type: integer
          description: Overdue by 1–30 days, in cents.
        overdue_31_plus:
          type: integer
          description: Overdue by 31 days or more, in cents.
      required: [current, overdue_1_30, overdue_31_plus]
    CompanySettings:
      type: object
      description: Issuer (自社) profile. registration_number is `T` + 13 digits.
      properties:
        organization_id:
          type: integer
        legal_name:
          type: string
        address:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        email:
          type: [string, 'null']
        registration_number:
          type: [string, 'null']
        bank_name:
          type: [string, 'null']
        bank_branch:
          type: [string, 'null']
        account_type:
          type: [string, 'null']
        account_number:
          type: [string, 'null']
        logo_url:
          type: [string, 'null']
        default_quote_validity_days:
          type: [integer, 'null']
          description: Default quote validity period in days (有効期限). null = no default.
        default_payment_closing_day:
          type: [integer, 'null']
          minimum: 1
          maximum: 31
          description: Payment closing day (締め日) 1–31; null = month-end (末日) when terms are configured.
        default_payment_month_offset:
          type: [integer, 'null']
          minimum: 0
          maximum: 12
          description: Payment month offset (支払月) — 0=当月, 1=翌月 … null = no payment-terms default.
        default_payment_pay_day:
          type: [integer, 'null']
          minimum: 1
          maximum: 31
          description: Payment day (支払日) 1–31; null = month-end (末日) when terms are configured.
        created_at:
          type: [string, 'null']
        updated_at:
          type: [string, 'null']
      required: [organization_id, legal_name]
    UpdateCompanySettingsRequest:
      type: object
      properties:
        legal_name:
          type: string
        address:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        email:
          type: [string, 'null']
        registration_number:
          type: [string, 'null']
        bank_name:
          type: [string, 'null']
        bank_branch:
          type: [string, 'null']
        account_type:
          type: [string, 'null']
        account_number:
          type: [string, 'null']
        logo_url:
          type: [string, 'null']
        default_quote_validity_days:
          type: [integer, 'null']
          minimum: 1
          maximum: 3650
          description: Default quote validity period in days (有効期限). null = no default.
        default_payment_closing_day:
          type: [integer, 'null']
          minimum: 1
          maximum: 31
          description: Payment closing day (締め日) 1–31; null = month-end (末日) when terms are configured.
        default_payment_month_offset:
          type: [integer, 'null']
          minimum: 0
          maximum: 12
          description: Payment month offset (支払月) — 0=当月, 1=翌月 … null = no payment-terms default.
        default_payment_pay_day:
          type: [integer, 'null']
          minimum: 1
          maximum: 31
          description: Payment day (支払日) 1–31; null = month-end (末日) when terms are configured.
      required: [legal_name]
    Client:
      type: object
      properties:
        id:
          type: integer
