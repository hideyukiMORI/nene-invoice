openapi: 3.1.0
info:
  title: NeNe Invoice API
  version: 0.1.0
  description: >
    NeNe Invoice API contract — self-hosted estimate / invoice / payment
    management for Japanese SMBs (qualified-invoice / 適格請求書 compliant).
    Multi-tenant (organization-scoped); money is always integer cents and tax
    rates are basis points (1000 = 10%). All mutating operations are audited.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: System
    description: Runtime health endpoint.
  - name: Auth
    description: Authentication and current-user self-service.
  - name: Audit
    description: Audit trail read access (admin oversight).
  - name: Organizations
    description: Tenant organizations (superadmin only).
  - name: Users
    description: User accounts within an organization (admin).
  - name: CompanySettings
    description: Issuer (自社) profile per organization.
  - name: Clients
    description: Buyers / trading partners (取引先).
  - name: Quotes
    description: Estimates / quotes (見積).
  - name: Invoices
    description: Invoices (請求書), including issue and quote conversion.
  - name: Payments
    description: Payments (入金) recorded against invoices.
paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      description: Reports runtime and database health.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: ok
                service: nene-invoice
                checks:
                  database: ok
  /auth/login:
    post:
      tags: [Auth]
      summary: Admin login
      description: Authenticates with email and password and returns a bearer token.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: admin@example.com
              password: secret
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/me:
    get:
      tags: [Auth]
      summary: Current user
      description: Returns the authenticated user resolved from the bearer token.
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /admin/audit-logs:
    get:
      tags: [Audit]
      summary: List audit logs
      description: >
        Lists the organization's audit trail, newest first. Admin oversight —
        requires the manage_users capability (admin / superadmin).
      operationId: listAuditLogs
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Audit log page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/organizations:
    get:
      tags: [Organizations]
      summary: List organizations
      operationId: listOrganizations
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Organization page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    post:
      tags: [Organizations]
      summary: Create organization
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
            example:
              name: Acme KK
              slug: acme
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '409':
          $ref: '#/components/responses/SlugConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/organizations/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Organizations]
      summary: Get organization by id
      operationId: getOrganizationById
      responses:
        '200':
          description: Organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Organizations]
      summary: Delete organization
      operationId: deleteOrganization
      responses:
        '204':
          description: Organization deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/users:
    get:
      tags: [Users]
      summary: List users
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: User page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    post:
      tags: [Users]
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              email: member@example.com
              password: secret
              role: member
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '409':
          $ref: '#/components/responses/EmailConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/users/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Users]
      summary: Get user by id
      operationId: getUserById
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/EmailConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    delete:
      tags: [Users]
      summary: Delete user
      operationId: deleteUser
      responses:
        '204':
          description: User deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /admin/company-settings:
    get:
      tags: [CompanySettings]
      summary: Get company settings
      description: Returns the issuer profile for the caller's organization.
      operationId: getCompanySettings
      responses:
        '200':
          description: Company settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanySettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [CompanySettings]
      summary: Update company settings
      description: Upserts the issuer profile (one record per organization).
      operationId: updateCompanySettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCompanySettingsRequest'
            example:
              legal_name: Acme KK
              registration_number: T1234567890123
      responses:
        '200':
          description: Company settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanySettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '422':
          $ref: '#/components/responses/InvalidRegistrationNumber'
  /admin/clients:
    get:
      tags: [Clients]
      summary: List clients
      operationId: listClients
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Client page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    post:
      tags: [Clients]
      summary: Create client
      operationId: createClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
            example:
              name: Buyer KK
              registration_number: T9876543210123
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '422':
          $ref: '#/components/responses/InvalidRegistrationNumber'
  /admin/clients/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Clients]
      summary: Get client by id
      operationId: getClientById
      responses:
        '200':
          description: Client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Clients]
      summary: Update client
      operationId: updateClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Client updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/InvalidRegistrationNumber'
    delete:
      tags: [Clients]
      summary: Delete client
      operationId: deleteClient
      responses:
        '204':
          description: Client deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/quotes:
    get:
      tags: [Quotes]
      summary: List quotes
      operationId: listQuotes
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Quote page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    post:
      tags: [Quotes]
      summary: Create quote
      description: Creates a draft quote; computes totals (round once per tax rate).
      operationId: createQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuoteRequest'
            example:
              client_id: 1
              line_items:
                - description: Consulting
                  quantity: 1
                  unit_price_cents: 100000
                  tax_rate_bps: 1000
      responses:
        '201':
          description: Quote created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/quotes/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Quotes]
      summary: Get quote by id
      operationId: getQuoteById
      responses:
        '200':
          description: Quote with line items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Quotes]
      summary: Change quote status
      description: Transitions the quote status (draft→sent→accepted/rejected/expired).
      operationId: changeQuoteStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeQuoteStatusRequest'
            example:
              status: sent
      responses:
        '200':
          description: Quote updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/InvalidStateTransition'
  /admin/quotes/{id}/convert:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [Invoices]
      summary: Convert quote to invoice
      description: Converts an accepted quote into a draft invoice (copies lines/totals).
      operationId: convertQuoteToInvoice
      responses:
        '201':
          description: Invoice created from quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      operationId: listInvoices
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Invoice page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    post:
      tags: [Invoices]
      summary: Create invoice
      description: Creates a draft invoice directly (no originating quote).
      operationId: createInvoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
            example:
              client_id: 1
              line_items:
                - description: License
                  quantity: 2
                  unit_price_cents: 50000
                  tax_rate_bps: 1000
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/invoices/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Invoices]
      summary: Get invoice by id
      operationId: getInvoiceById
      responses:
        '200':
          description: Invoice with line items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/invoices/{id}/pdf:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Invoices]
      summary: Download invoice PDF
      description: >
        Generates and streams the invoice as a PDF (適格請求書 layout when
        is_qualified_invoice is true). Requires ViewBilling capability.
        Returns application/pdf with Content-Disposition: attachment.
      operationId: getInvoicePdf
      security:
        - bearerAuth: []
      responses:
        '200':
          description: PDF binary
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/invoices/{id}/issue:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [Invoices]
      summary: Issue invoice
      description: >
        Issues a draft invoice: allocates an INV number and locks it. A qualified
        invoice requires the issuer registration number in company settings.
      operationId: issueInvoice
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueInvoiceRequest'
            example:
              qualified: true
      responses:
        '200':
          description: Invoice issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/QualifiedInvoiceIncomplete'
  /admin/invoices/{id}/payments:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Payments]
      summary: List payments
      description: Lists the payments recorded against an invoice.
      operationId: listPayments
      responses:
        '200':
          description: Payments for the invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Payments]
      summary: Record payment
      description: >
        Records a payment against an issued invoice and advances its status to
        partially_paid or paid. Amounts are integer cents; over-payment is rejected.
      operationId: recordPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaymentRequest'
            example:
              amount_cents: 110000
              method: bank_transfer
      responses:
        '201':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordPaymentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    LimitParam:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return (1–100, default 20).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      required: false
      description: Number of items to skip (default 0).
      schema:
        type: integer
        minimum: 0
        default: 0
    IdPathParam:
      name: id
      in: path
      required: true
      description: Resource identifier.
      schema:
        type: integer
        minimum: 1
  responses:
    Unauthorized:
      description: Missing or invalid bearer token, or bad credentials.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InsufficientCapability:
      description: Authenticated but lacking the required capability.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Resource not found (or not in the caller's organization).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      description: Conflicting request (e.g. cannot delete self).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    SlugConflict:
      description: Organization slug already in use.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    EmailConflict:
      description: User email already in use.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ValidationFailed:
      description: Request body or field validation error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InvalidRegistrationNumber:
      description: Registration number is not `T` followed by 13 digits.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InvalidStateTransition:
      description: Disallowed status change.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    QualifiedInvoiceIncomplete:
      description: A required qualified-invoice field is missing.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    ProblemDetails:
      type: object
      description: RFC 9457 problem details.
      properties:
        type:
          type: string
          description: Problem type URI (base https://nene-invoice.dev/problems/).
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
      required: [type, title, status]
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: nene-invoice
        checks:
          type: object
          properties:
            database:
              type: string
              example: ok
      required: [status, service]
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: HMAC bearer token (HS256).
      required: [token]
    CurrentUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        organization_id:
          type: [integer, 'null']
      required: [id, email, role]
    Role:
      type: string
      enum: [superadmin, admin, member, viewer]
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        role:
