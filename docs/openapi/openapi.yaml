              row: { type: integer, description: 1-based spreadsheet row (header = 1) }
              column: { type: [string, 'null'] }
              code: { type: string }
              message: { type: string }
            required: [row, column, code, message]
      required: [accepted, dry_run, format_error, summary, errors]
    CreateClientRequest:
      type: object
