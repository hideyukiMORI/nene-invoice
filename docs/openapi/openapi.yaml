          description: Not yet due (due_at null or in the future), in cents.
        overdue_1_30:
          type: integer
          description: Overdue by 1–30 days, in cents.
        overdue_31_plus:
          type: integer
          description: Overdue by 31 days or more, in cents.
      required: [current, overdue_1_30, overdue_31_plus]
