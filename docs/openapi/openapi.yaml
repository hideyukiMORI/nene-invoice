            $ref: '#/components/schemas/LineItemInput'
      required: [name]
    LineItem:
      type: object
      description: A line on a quote or invoice. Money is integer cents.
      properties:
        id:
          type: integer
        description:
          type: string
        quantity:
          type: integer
        unit_price_cents:
          type: integer
          description: Unit price in integer cents (smallest currency unit).
        tax_rate_bps:
          type: integer
          description: Tax rate in basis points (1000 = 10%, 800 = 8%).
        sort_order:
          type: integer
        line_subtotal_cents:
          type: integer
          description: quantity × unit_price_cents (pre-tax, not rounded).
      required: [description, quantity, unit_price_cents, tax_rate_bps]
    LineItemInput:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_price_cents:
          type: integer
          minimum: 0
        tax_rate_bps:
          type: integer
          enum: [800, 1000]
      required: [description, quantity, unit_price_cents, tax_rate_bps]
    Quote:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        client_id:
          type: integer
        client_name:
          type: [string, 'null']
          description: Client display name (list responses only; null elsewhere).
        quote_number:
          type: string
          description: Format EST-YYYY-NNN.
        status:
          type: string
          enum: [draft, sent, accepted, rejected, expired]
        issued_at:
          type: [string, 'null']
        valid_until:
          type: [string, 'null']
        subtotal_cents:
          type: integer
        tax_cents:
          type: integer
        total_cents:
          type: integer
        notes:
          type: [string, 'null']
        created_at:
          type: [string, 'null']
        updated_at:
          type: [string, 'null']
      required: [id, organization_id, client_id, quote_number, status, subtotal_cents, tax_cents, total_cents]
    QuoteWithLines:
      allOf:
        - $ref: '#/components/schemas/Quote'
        - type: object
          properties:
            line_items:
              type: array
              items:
                $ref: '#/components/schemas/LineItem'
    QuoteList:
      $ref: '#/components/schemas/PageEnvelope'
    CreateQuoteRequest:
      type: object
      properties:
        client_id:
          type: integer
        line_items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LineItemInput'
        valid_until:
          type: [string, 'null']
        notes:
          type: [string, 'null']
      required: [client_id, line_items]
    ChangeQuoteStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [draft, sent, accepted, rejected, expired]
      required: [status]
    Invoice:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        client_id:
          type: integer
        client_name:
          type: [string, 'null']
          description: Client display name (list responses only; null elsewhere).
        quote_id:
          type: [integer, 'null']
        invoice_number:
          type: [string, 'null']
          description: Null until issued; format INV-YYYY-NNN.
        status:
          type: string
          enum: [draft, issued, partially_paid, paid]
        is_overdue:
          type: boolean
          description: >
            Computed read-only field. True when status is issued or partially_paid
            and due_at is in the past. Always false for draft and paid invoices.
        is_qualified_invoice:
          type: boolean
        issued_at:
          type: [string, 'null']
        due_at:
          type: [string, 'null']
        subtotal_cents:
          type: integer
        tax_cents:
          type: integer
        total_cents:
          type: integer
        outstanding_cents:
          type: integer
          description: >
            total_cents − Σ valid payments. Present on read endpoints (list / get);
            authoritative balance owned by Invoice. Integer cents.
        notes:
          type: [string, 'null']
        created_at:
          type: [string, 'null']
        updated_at:
          type: [string, 'null']
      required: [id, organization_id, client_id, status, is_overdue, is_qualified_invoice, subtotal_cents, tax_cents, total_cents]
    InvoiceWithLines:
      allOf:
