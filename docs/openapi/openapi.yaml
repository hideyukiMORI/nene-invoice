openapi: 3.1.0
info:
  title: NeNe Invoice API
  version: 0.1.0
  description: >
    NeNe Invoice API contract — self-hosted estimate / invoice / payment
    management for Japanese SMBs (qualified-invoice / 適格請求書 compliant).
    Multi-tenant (organization-scoped); money is always integer cents and tax
    rates are basis points (1000 = 10%). All mutating operations are audited.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: System
    description: Runtime health endpoint.
  - name: Auth
    description: Authentication and current-user self-service.
  - name: Audit
    description: Audit trail read access (admin oversight).
  - name: Organizations
    description: Tenant organizations (superadmin only).
  - name: Users
    description: User accounts within an organization (admin).
  - name: CompanySettings
    description: Issuer (自社) profile per organization.
  - name: Clients
    description: Buyers / trading partners (取引先).
  - name: Items
    description: Item master (品目) — reusable descriptions with default price / tax.
  - name: Templates
    description: Named quote/invoice templates (雛形) — reusable line presets + notes.
  - name: Quotes
    description: Estimates / quotes (見積).
  - name: RecurringInvoices
    description: Recurring-billing schedules (継続請求) — reusable templates that generate invoices each period (#503).
  - name: Invoices
    description: Invoices (請求書), including issue and quote conversion.
  - name: Payments
    description: Payments (入金) recorded against invoices.
  - name: BankTransactions
    description: Bank statement import and receivable auto-reconciliation (自動消込) — staging, match suggestions, confirm-to-payment (#505).
  - name: LineItems
    description: Document line items (品目) and history-based suggestions.
  - name: ServiceTokens
    description: NeNe Clear integration credentials (machine tokens) — issue / list / revoke (admin oversight, ADR 0009).
paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      description: Reports runtime and database health.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: ok
                service: nene-invoice
                checks:
                  database: ok
  /auth/login:
    post:
      tags: [Auth]
      summary: Admin login
      description: Authenticates with email and password and returns a bearer token.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: admin@example.com
              password: secret
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Silent re-authentication
      description: >
        Exchanges the httpOnly refresh cookie for a fresh in-memory access token
        and rotates the refresh token (ADR 0014). Requires the double-submit CSRF
        header. On any failure the session fails closed (401) and the cookies are
        cleared, so the SPA falls back to the login screen.
      operationId: refreshSession
      security:
        - refreshCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      responses:
        '200':
          description: Access token re-issued; refresh + CSRF cookies rotated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/CsrfForbidden'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (server-side revocation)
      description: >
        Revokes the refresh-token family server-side and clears the cookies
        (ADR 0014). Idempotent: returns 204 and clears the cookies even when no
        valid cookie is presented. Requires the double-submit CSRF header.
      operationId: logout
      security:
        - refreshCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      responses:
        '204':
          description: Session revoked; cookies cleared.
        '403':
          $ref: '#/components/responses/CsrfForbidden'
  /admin/me:
    get:
      tags: [Auth]
      summary: Current user
      description: Returns the authenticated user resolved from the bearer token.
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /admin/dashboard:
    get:
      tags: [System]
      summary: Dashboard summary
      description: >
        Returns aggregated counts and the 5 most recent unpaid invoices for
        the caller's organization. Requires ViewBilling capability.
      operationId: getDashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/line-items/suggestions:
    get:
      tags: [LineItems]
      summary: List line-item suggestions
      description: >
        History-based line-item suggestions for the caller's organization,
        aggregated from past invoices and quotes (distinct descriptions with the
        default unit price / tax rate, ordered by usage). The defaults are
        conveniences and never override the tax that applies to a sale. Returned
        in full for client-side typeahead filtering. Requires ViewBilling.
      operationId: listLineItemSuggestions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Line-item suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineItemSuggestionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/audit-logs:
    get:
      tags: [Audit]
      summary: List audit logs
      description: >
        Lists the organization's audit trail, newest first. Admin oversight —
        requires the manage_users capability (admin / superadmin).
      operationId: listAuditLogs
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: entity_type
          in: query
          required: false
          description: Filter by entity type (exact match), e.g. invoice, client.
          schema:
            type: string
        - name: action
          in: query
          required: false
          description: Filter by action (exact match), e.g. invoice.issued.
          schema:
            type: string
        - name: actor_user_id
          in: query
          required: false
          description: Filter by the acting user id (exact match).
          schema:
            type: integer
        - name: created_from
          in: query
          required: false
          description: Inclusive lower bound on created_at (YYYY-MM-DD or full datetime).
          schema:
            type: string
        - name: created_to
          in: query
          required: false
          description: >
            Inclusive upper bound on created_at. A date-only value covers the
            whole day (expanded to 23:59:59).
          schema:
            type: string
      responses:
        '200':
          description: Audit log page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/audit-logs/export:
    get:
      tags: [Audit]
      summary: Export audit logs as CSV
      description: >
        Downloads the (optionally filtered) audit trail as a UTF-8 BOM CSV file.
        Accepts the same filters as the list endpoint. Requires the manage_users
        capability (admin / superadmin).
      operationId: exportAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - name: entity_type
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: actor_user_id
          in: query
          required: false
          schema:
            type: integer
        - name: created_from
          in: query
          required: false
          schema:
            type: string
        - name: created_to
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/organizations:
    get:
      tags: [Organizations]
      summary: List organizations
      operationId: listOrganizations
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Organization page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    post:
      tags: [Organizations]
      summary: Create organization
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
            example:
              name: Acme KK
              slug: acme
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '409':
          $ref: '#/components/responses/SlugConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/organizations/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Organizations]
      summary: Get organization by id
      operationId: getOrganizationById
      responses:
        '200':
          description: Organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Organizations]
      summary: Update organization
      description: >-
        Partial update (superadmin). Only the provided fields change; is_active
        suspends (false) or reactivates (true) the tenant. slug and external_id
        are immutable here.
      operationId: updateOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
            example:
              is_active: false
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    delete:
      tags: [Organizations]
      summary: Delete organization
      operationId: deleteOrganization
      responses:
        '204':
          description: Organization deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/users:
    get:
      tags: [Users]
      summary: List users
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: User page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    post:
      tags: [Users]
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              email: member@example.com
              password: secret
              role: member
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '409':
          $ref: '#/components/responses/EmailConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/users/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Users]
      summary: Get user by id
      operationId: getUserById
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/EmailConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    delete:
      tags: [Users]
      summary: Delete user
      operationId: deleteUser
      responses:
        '204':
          description: User deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /admin/gateway-settings:
    get:
      tags: [Payments]
      summary: Get card payment gateway status
      description: >
        Reports whether the PAY.JP gateway is configured (credentials live in the
        environment — ADR 0013). Never returns the secret key; the public key is
        masked. Capability: ManageCompanySettings.
      operationId: getGatewaySettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Gateway status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewaySettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/gateway-settings/test:
    post:
      tags: [Payments]
      summary: Test gateway connectivity
      description: >
        Runs a live connectivity check against the gateway using the configured
        (env) credentials. Always 200 with an `ok` flag and a `detail` reason.
        Capability: ManageCompanySettings.
      operationId: testGatewayConnectivity
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Connectivity result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayConnectivityResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/company-settings:
    get:
      tags: [CompanySettings]
      summary: Get company settings
      description: Returns the issuer profile for the caller's organization.
      operationId: getCompanySettings
      responses:
        '200':
          description: Company settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanySettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [CompanySettings]
      summary: Update company settings
      description: Upserts the issuer profile (one record per organization).
      operationId: updateCompanySettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCompanySettingsRequest'
            example:
              legal_name: Acme KK
              registration_number: T1234567890123
      responses:
        '200':
          description: Company settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanySettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '422':
          $ref: '#/components/responses/InvalidRegistrationNumber'
  /admin/company-settings/seal:
    get:
      tags: [CompanySettings]
      summary: Get company seal
      description: Returns the organization's seal (社印) PNG as base64 for preview, or has_seal=false when none is set.
      operationId: getCompanySeal
      responses:
        '200':
          description: Seal image (or none)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanySeal'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    put:
      tags: [CompanySettings]
      summary: Upload company seal
      description: Upserts the organization's seal from a base64 PNG. Validated as PNG within size and dimension caps.
      operationId: putCompanySeal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutCompanySealRequest'
      responses:
        '200':
          description: Seal stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanySealState'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    delete:
      tags: [CompanySettings]
      summary: Delete company seal
      description: Removes the organization's seal. Idempotent.
      operationId: deleteCompanySeal
      responses:
        '200':
          description: Seal removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanySealState'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/clients:
    get:
      tags: [Clients]
      summary: List clients
      operationId: listClients
      description: >
        Lists clients with optional search / sort (admin). `q` matches name,
        contact, email, or registration number; `sort` ∈ name|contact|email|
        registration with `order` asc|desc.
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - { name: q, in: query, required: false, schema: { type: string } }
        - { name: sort, in: query, required: false, schema: { type: string, enum: [name, contact, email, registration] } }
        - { name: order, in: query, required: false, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: Client page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    post:
      tags: [Clients]
      summary: Create client
      operationId: createClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
            example:
              name: Buyer KK
              registration_number: T9876543210123
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '422':
          $ref: '#/components/responses/InvalidRegistrationNumber'
  /admin/clients/export:
    get:
      tags: [Clients]
      summary: Export clients as CSV
      description: >
        Downloads the (optionally filtered) clients for the organization as a
        UTF-8 BOM CSV file compatible with Excel. Accepts the same `q` filter as
        the list endpoint, so the export mirrors what the list shows. Cells are
        neutralized against spreadsheet formula injection. Requires ViewBilling
        capability.
      operationId: exportClientsCsv
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          description: Search term (matches name, kana, contact, email, or registration number).
          schema:
            type: string
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/clients/import-template:
    get:
      tags: [Clients]
      summary: Download the clients import template
      description: >
        Returns the UTF-8 (BOM) CSV template (header only) for client import.
        The user adds rows beneath the header and uploads to the import endpoint.
        Requires ViewBilling capability. See ADR 0011.
      operationId: getClientsImportTemplate
      security:
        - bearerAuth: []
      responses:
        '200':
          description: CSV template file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/clients/import:
    post:
      tags: [Clients]
      summary: Import clients from a template CSV
      description: >
        Template-only import (ADR 0011). The request body is the raw template CSV
        (`text/csv`). The whole file is validated first: on a format error or any
        invalid row, nothing is written and a report is returned (422). On
        success, rows are applied in one transaction (200). The `id` column drives
        create (blank) vs. update (existing own-org id). `?dry_run=1` validates
        and returns the same report without writing. Requires ManageBilling.
      operationId: importClientsCsv
      security:
        - bearerAuth: []
      parameters:
        - name: dry_run
          in: query
          required: false
          description: When '1', validate and report without writing.
          schema:
            type: string
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
      responses:
        '200':
          description: Import accepted (applied, or validated under dry-run)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsvImportReport'
        '422':
          description: Rejected — format error or row errors; nothing written
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsvImportReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/clients/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Clients]
      summary: Get client by id
      operationId: getClientById
      responses:
        '200':
          description: Client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Clients]
      summary: Update client
      operationId: updateClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Client updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
