          type: [string, 'null']
        updated_at:
          type: [string, 'null']
      required: [id, name, slug, is_active]
    OrganizationList:
      $ref: '#/components/schemas/PageEnvelope'
    CreateOrganizationRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
      required: [name, slug]
    DownloadTokenResponse:
      type: object
      properties:
        url:
          type: string
