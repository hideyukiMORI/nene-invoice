        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/quotes/export:
    get:
      tags: [Quotes]
      summary: Export quotes as CSV
      description: >
        Downloads the (optionally filtered) quotes for the organization as a
        UTF-8 BOM CSV file compatible with Excel. Accepts the same filters as
        the list endpoint, so the export mirrors what the list shows.
        Requires ViewBilling capability.
      operationId: exportQuotesCsv
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          description: Search term (matches quote number or client name).
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Comma-separated subset of quote statuses.
          schema:
            type: string
        - name: valid_from
          in: query
          required: false
          description: valid_until lower bound (YYYY-MM-DD, inclusive).
          schema:
            type: string
            format: date
        - name: valid_to
          in: query
          required: false
          description: valid_until upper bound (YYYY-MM-DD, inclusive).
          schema:
            type: string
            format: date
        - name: total_min
          in: query
          required: false
          schema:
            type: integer
        - name: total_max
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/invoices/export:
    get:
      tags: [Invoices]
      summary: Export invoices as CSV
      description: >
        Downloads the (optionally filtered) issued (non-draft) invoices for the
        organization as a UTF-8 BOM CSV file compatible with Excel and
        accounting software. Accepts the same filters as the list endpoint, so
        the export mirrors what the list shows. The issued-date range
        (issued_from / issued_to) is the accounting-period axis. Requires
        ViewBilling capability.
      operationId: exportInvoicesCsv
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          description: Search term (matches invoice number or client name).
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Comma-separated subset of invoice statuses.
          schema:
            type: string
        - name: overdue
          in: query
          required: false
          description: When '1', only overdue (issued/partially_paid, past due) invoices.
          schema:
            type: string
        - name: due_from
          in: query
          required: false
          description: due_at lower bound (YYYY-MM-DD, inclusive).
          schema:
            type: string
            format: date
        - name: due_to
          in: query
          required: false
          description: due_at upper bound (YYYY-MM-DD, inclusive).
          schema:
            type: string
            format: date
        - name: issued_from
          in: query
          required: false
          description: issued_at lower bound (YYYY-MM-DD, inclusive).
          schema:
            type: string
            format: date
        - name: issued_to
          in: query
          required: false
          description: issued_at upper bound (YYYY-MM-DD, inclusive).
          schema:
            type: string
            format: date
        - name: total_min
          in: query
          required: false
          schema:
            type: integer
        - name: total_max
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/payments/export:
    get:
      tags: [Payments]
      summary: Export payments as CSV
      description: >
        Downloads all valid (non-voided) payments for the organization as a
        UTF-8 BOM CSV file compatible with Excel and accounting software.
        Includes invoice number and client name for reference.
        Requires ViewBilling capability.
      operationId: exportPaymentsCsv
      security:
        - bearerAuth: []
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
  /admin/invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      operationId: listInvoices
      description: >
        Lists invoices with optional search / filters / sort (admin). `q` matches
        invoice number or client name; `status` is a comma-separated subset;
        `sort` ∈ number|client|status|issued_at|due_at|total with `order` asc|desc.
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - { name: q, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: string } }
        - { name: overdue, in: query, required: false, schema: { type: string, enum: ['1'] } }
        - { name: due_from, in: query, required: false, schema: { type: string } }
        - { name: due_to, in: query, required: false, schema: { type: string } }
        - { name: total_min, in: query, required: false, schema: { type: integer } }
        - { name: total_max, in: query, required: false, schema: { type: integer } }
        - { name: sort, in: query, required: false, schema: { type: string, enum: [number, client, status, issued_at, due_at, total] } }
        - { name: order, in: query, required: false, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: Invoice page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
    post:
      tags: [Invoices]
      summary: Create invoice
      description: Creates a draft invoice directly (no originating quote).
      operationId: createInvoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
            example:
              client_id: 1
              line_items:
                - description: License
                  quantity: 2
                  unit_price_cents: 50000
                  tax_rate_bps: 1000
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/invoices/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Invoices]
      summary: Get invoice by id
      operationId: getInvoiceById
      responses:
        '200':
          description: Invoice with line items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/invoices/{id}/pdf:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Invoices]
      summary: Download invoice PDF
      description: >
        Generates and streams the invoice as a PDF (適格請求書 layout when
        is_qualified_invoice is true). Requires ViewBilling capability.
        Returns application/pdf with Content-Disposition: attachment.
      operationId: getInvoicePdf
      security:
        - bearerAuth: []
      responses:
        '200':
          description: PDF binary
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/invoices/{id}/download-token:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [Invoices]
      summary: Generate public download token
      description: >
        Generates a time-limited (7 days) public URL for the invoice PDF.
        The URL requires no authentication — share it with the client.
        Requires ManageBilling capability.
      operationId: generateDownloadToken
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Token generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
  /invoices/download/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Invoices]
      summary: Public PDF download
      description: >
        Downloads the invoice PDF using a previously generated token. No
        authentication required. Returns 404 for missing or expired tokens.
      operationId: downloadInvoicePdf
      responses:
        '200':
          description: PDF binary
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/invoices/{id}/issue:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [Invoices]
      summary: Issue invoice
      description: >
        Issues a draft invoice: allocates an INV number and locks it. A qualified
        invoice requires the issuer registration number in company settings.
      operationId: issueInvoice
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueInvoiceRequest'
            example:
              qualified: true
      responses:
        '200':
          description: Invoice issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/QualifiedInvoiceIncomplete'
  /admin/invoices/{id}/send-email:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    post:
      tags: [Invoices]
      summary: Send invoice by email
      description: >
        Generates the invoice PDF and sends it to the client's email address.
        Requires the invoice to be in issued, partially_paid, or paid status
        and the client to have an email address. Requires ManageBilling capability.
      operationId: sendInvoiceEmail
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Email sent
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /admin/invoices/{id}/payments:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Payments]
      summary: List payments
      description: Lists the payments recorded against an invoice.
      operationId: listPayments
      responses:
        '200':
          description: Payments for the invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Payments]
      summary: Record payment
      description: >
        Records a payment against an issued invoice and advances its status to
        partially_paid or paid. Amounts are integer cents; over-payment is rejected.
      operationId: recordPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaymentRequest'
            example:
              amount_cents: 110000
              method: bank_transfer
      responses:
        '201':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordPaymentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InsufficientCapability'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    LimitParam:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return (1–100, default 20).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      required: false
      description: Number of items to skip (default 0).
      schema:
        type: integer
        minimum: 0
        default: 0
    IdPathParam:
      name: id
      in: path
      required: true
      description: Resource identifier.
      schema:
        type: integer
        minimum: 1
  responses:
    Unauthorized:
      description: Missing or invalid bearer token, or bad credentials.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InsufficientCapability:
      description: Authenticated but lacking the required capability.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Resource not found (or not in the caller's organization).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      description: Conflicting request (e.g. cannot delete self).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    SlugConflict:
      description: Organization slug already in use.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    EmailConflict:
      description: User email already in use.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    TooManyRequests:
      description: Too many failed login attempts from the source IP.
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ValidationFailed:
      description: Request body or field validation error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InvalidRegistrationNumber:
      description: Registration number is not `T` followed by 13 digits.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InvalidStateTransition:
      description: Disallowed status change.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    QualifiedInvoiceIncomplete:
      description: A required qualified-invoice field is missing.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    ProblemDetails:
      type: object
      description: RFC 9457 problem details.
      properties:
        type:
          type: string
          description: Problem type URI (base https://nene-invoice.dev/problems/).
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
      required: [type, title, status]
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: nene-invoice
        checks:
